services:
  - type: web
    name: attendance-system
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && bash build.sh
    startCommand: gunicorn attendance_system.wsgi:application --bind 0.0.0.0:$PORT
    staticPublishPath: staticfiles
    envVars:
      - key: DJANGO_SECRET_KEY
        sync: false
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: "attendance-system-6a30.onrender.com"
