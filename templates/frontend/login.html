<!doctype html>
{% load static %}
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Exodus</title>
    <meta name="description" content="Sign in to Exodus ÔÇö university attendance tracking powered by QR codes, geolocation, and two-factor authentication." />
    <meta property="og:title" content="Login - Exodus" />
    <meta property="og:description" content="Sign in to Exodus ÔÇö university attendance tracking powered by QR codes, geolocation, and two-factor authentication." />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Exodus" />
    <meta name="theme-color" content="#4f46e5" />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%234f46e5'/><text x='50%25' y='55%25' dominant-baseline='middle' text-anchor='middle' fill='white' font-size='20' font-weight='bold'>E</text></svg>"
    />
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/styles.css' %}" />
    <script defer src="{% static 'js/alpine.min.js' %}"></script>
  </head>
  <body class="bg-gray-50 flex items-center justify-center min-h-screen bg-gradient-to-br from-brand-600 via-indigo-900 to-purple-900 dark:from-gray-900 dark:via-gray-900 dark:to-black selection:bg-brand-500 selection:text-white overflow-hidden relative">
    
    <!-- Animated background blooms -->
    <div class="absolute top-0 left-0 w-full h-full overflow-hidden z-0 pointer-events-none">
      <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-brand-500 blur-[120px] opacity-30 animate-pulse-slow"></div>
      <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full bg-purple-500 blur-[120px] opacity-30 animate-pulse-slow" style="animation-delay: 1.5s;"></div>
    </div>

    <div class="mx-auto flex flex-col items-center justify-center px-6 py-8 w-full max-w-md z-10 animate-fade-in-up">
      <div
        class="w-full rounded-[2.5rem] border border-white/20 bg-white/10 backdrop-blur-xl shadow-2xl p-8 sm:p-10"
      >
        <div class="text-center mb-8">
            <div class="mx-auto mb-4 inline-flex items-center justify-center h-16 w-16 rounded-2xl bg-gradient-to-br from-brand-400 to-brand-600 text-white shadow-lg shadow-brand-500/50">
              <svg class="h-8 w-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path>
              </svg>
            </div>
            <h1 class="text-3xl font-extrabold tracking-tight text-white mb-2">Exodus</h1>
            <p class="text-indigo-200">Sign in to your account</p>
        </div>

        <form class="space-y-6" action="{% url 'frontend:login' %}" method="POST">
            {% csrf_token %}
            <input type="hidden" name="next" value="{{ request.GET.next }}" />

            <div x-data="{ focused: false, hasValue: document.getElementById('username')?.value.length > 0 }" x-init="setTimeout(()=> hasValue = document.getElementById('username')?.value.length > 0, 100)" class="relative focus-within:z-10">
              <div class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-3">
                <svg class="h-5 w-5 text-indigo-200/70" fill="currentColor" viewBox="0 0 20 20">
                  <path d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" />
                </svg>
              </div>
              <input
                type="text"
                name="username"
                id="username"
                autocomplete="username"
                @focusin="focused = true" @focusout="focused = false" @input="hasValue = $event.target.value.length > 0"
                class="block w-full rounded-xl border border-white/20 bg-white/10 pl-10 pr-4 py-3.5 text-white placeholder-transparent focus:border-white focus:bg-white/20 focus:ring-0 transition-all sm:text-sm"
                required=""
              />
              <label
                for="username"
                class="absolute left-10 pointer-events-none transition-all duration-200 text-indigo-200/70"
                :class="(focused || hasValue) ? '-translate-y-8 -translate-x-4 bg-transparent text-xs uppercase tracking-wider font-bold text-white shadow-none border-none outline-none' : 'top-1/2 -translate-y-1/2 text-sm font-medium'"
              >
                Your Username
              </label>
            </div>

            <div x-data="{ show: false, focused: false, hasValue: document.getElementById('password')?.value.length > 0 }" x-init="setTimeout(()=> hasValue = document.getElementById('password')?.value.length > 0, 100)">
              <div class="relative focus-within:z-10">
                <div class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-3">
                  <svg class="h-5 w-5 text-indigo-200/70" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"/>
                  </svg>
                </div>
                <input
                  :type="show ? 'text' : 'password'"
                  name="password"
                  id="password"
                  autocomplete="current-password"
                  @focusin="focused = true" @focusout="focused = false" @input="hasValue = $event.target.value.length > 0"
                  class="block w-full rounded-xl border border-white/20 bg-white/10 pl-10 pr-16 py-3.5 text-white placeholder-transparent focus:border-white focus:bg-white/20 focus:ring-0 transition-all sm:text-sm"
                  required=""
                />
                <button
                  type="button"
                  @click="show = !show"
                  class="absolute inset-y-0 right-0 flex items-center pr-4 text-sm font-medium text-indigo-200 hover:text-white transition-colors cursor-pointer"
                >
                  <span x-text="show ? 'Hide' : 'Show'"></span>
                </button>
                <label
                  for="password"
                  class="absolute left-10 pointer-events-none transition-all duration-200 text-indigo-200/70"
                  :class="(focused || hasValue) ? '-translate-y-8 -translate-x-4 bg-transparent text-xs uppercase tracking-wider font-bold text-white shadow-none border-none outline-none' : 'top-1/2 -translate-y-1/2 text-sm font-medium'"
                >
                  Password
                </label>
              </div>
            </div>

            {% if messages %} 
              {% for message in messages %}
              <div class="rounded-xl bg-red-500/20 border border-red-500/50 p-4 text-sm text-red-100 backdrop-blur-md" role="alert">
                {{ message }}
              </div>
              {% endfor %} 
            {% endif %} 
            
            {% if form.errors %}
              <div class="rounded-xl bg-red-500/20 border border-red-500/50 p-4 text-sm text-red-100 backdrop-blur-md">
                Username or password incorrect.
              </div>
            {% endif %}

            <div class="flex items-center justify-end">
              <a href="{% url 'frontend:password_reset' %}" class="text-sm font-medium text-brand-200 hover:text-white transition-colors">Forgot password?</a>
            </div>

            <button
              type="submit"
              class="w-full rounded-xl bg-gradient-to-r from-brand-500 to-purple-600 px-5 py-3.5 text-center text-sm font-bold text-white shadow-lg shadow-brand-500/30 hover:shadow-brand-500/50 hover:-translate-y-0.5 transition-all focus:outline-none focus:ring-4 focus:ring-brand-500/50"
            >
              Sign in
            </button>

            <!-- Registration Link -->
            <div class="text-center mt-6">
              <p class="text-sm text-indigo-200">
                Don't have an account?
                <a href="{% url 'frontend:register' %}" class="font-bold text-white hover:text-brand-200 transition-colors">
                  Create an account
                </a>
              </p>
            </div>
          </form>
      </div>
    </div>

    <style>
      input:-webkit-autofill,
      input:-webkit-autofill:hover, 
      input:-webkit-autofill:focus, 
      input:-webkit-autofill:active{
          -webkit-box-shadow: 0 0 0 30px #1a1744 inset !important;
          -webkit-text-fill-color: white !important;
          transition: background-color 5000s ease-in-out 0s;
      }
      input[type="password"]::-ms-reveal,
      input[type="password"]::-ms-clear {
        display: none;
      }
      input:focus {
        outline: none;
      }
    </style>
  </body>
</html>
