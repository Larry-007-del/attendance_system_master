{% extends 'base.html' %} {% block title %}Change Password - Exodus{% endblock %} {% block content
%}
<div class="mx-auto max-w-lg">
  <div class="mb-6">
    <a
      href="{% url 'frontend:profile' %}"
      class="mb-2 inline-flex items-center text-sm text-indigo-600 hover:text-indigo-800"
    >
      <svg class="mr-1 h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M15 19l-7-7 7-7"
        ></path>
      </svg>
      Back to Profile
    </a>
    <h1 class="text-2xl font-bold text-gray-900">Change Password</h1>
    <p class="mt-1 text-gray-500">Secure your account with a new password</p>
  </div>

  <div class="rounded-2xl border border-gray-100 bg-white p-6 shadow-sm">
    <form method="post" action="{% url 'frontend:change_password' %}" class="space-y-5">
      {% csrf_token %}

      <div>
        <label for="current_password" class="mb-1 block text-sm font-medium text-gray-700"
          >Current Password</label
        >
        <input
          type="password"
          name="current_password"
          id="current_password"
          required
          class="w-full rounded-lg border border-gray-300 px-3 py-2.5 focus:border-indigo-500 focus:ring-indigo-500"
          placeholder="Enter current password"
        />
      </div>

      <hr class="border-gray-200" />

      <div>
        <label for="new_password" class="mb-1 block text-sm font-medium text-gray-700"
          >New Password</label
        >
        <input
          type="password"
          name="new_password"
          id="new_password"
          required
          minlength="8"
          class="w-full rounded-lg border border-gray-300 px-3 py-2.5 focus:border-indigo-500 focus:ring-indigo-500"
          placeholder="At least 8 characters"
        />
        <p class="mt-1 text-xs text-gray-400">Minimum 8 characters</p>
      </div>

      <div>
        <label for="confirm_password" class="mb-1 block text-sm font-medium text-gray-700"
          >Confirm New Password</label
        >
        <input
          type="password"
          name="confirm_password"
          id="confirm_password"
          required
          minlength="8"
          class="w-full rounded-lg border border-gray-300 px-3 py-2.5 focus:border-indigo-500 focus:ring-indigo-500"
          placeholder="Re-enter new password"
        />
      </div>

      <div class="flex items-center justify-between pt-2">
        <a href="{% url 'frontend:profile' %}" class="text-sm text-gray-500 hover:text-gray-700"
          >Cancel</a
        >
        <button
          type="submit"
          class="rounded-lg bg-indigo-600 px-6 py-2.5 font-medium text-white transition hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2"
        >
          Update Password
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
