<!doctype html>
{% load static %}
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register - Exodus</title>
    <meta
      name="description"
      content="Create your Exodus account — join your university's real-time attendance tracking system with QR check-in and biometric 2FA."
    />
    <meta property="og:title" content="Register - Exodus" />
    <meta
      property="og:description"
      content="Create your Exodus account — join your university's real-time attendance tracking system with QR check-in and biometric 2FA."
    />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Exodus" />
    <meta name="theme-color" content="#4f46e5" />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%234f46e5'/><text x='50%25' y='55%25' dominant-baseline='middle' text-anchor='middle' fill='white' font-size='20' font-weight='bold'>E</text></svg>"
    />
    <link rel="stylesheet" href="{% static 'css/styles.css' %}" />
    <script src="{% static 'js/htmx.min.js' %}"></script>
    <script defer src="{% static 'js/alpine.min.js' %}"></script>
  </head>
  <body
    class="flex min-h-screen items-center justify-center bg-gradient-to-br from-indigo-500 to-purple-600 p-4"
  >
    <div class="w-full max-w-md overflow-hidden rounded-lg bg-white shadow-xl">
      <!-- Header -->
      <div class="bg-indigo-600 px-8 py-6 text-center">
        <h1 class="text-2xl font-bold text-white">Exodus</h1>
        <p class="mt-1 text-indigo-200">Create Your Account</p>
      </div>

      <!-- Messages -->
      {% if messages %}
      <div class="px-8 pt-4">
        {% for message in messages %}
        <div
          class="{% if message.tags == 'error' %}bg-red-100 text-red-700{% elif message.tags == 'success' %}bg-green-100 text-green-700{% else %}bg-blue-100 text-blue-700{% endif %} rounded-md p-3 text-sm"
        >
          {{ message }}
        </div>
        {% endfor %}
      </div>
      {% endif %}

      <!-- Registration Form -->
      <div class="px-8 py-8">
        <form method="post" action="{% url 'frontend:register' %}" class="space-y-6">
          {% csrf_token %}

          <!-- Username -->
          <div>
            <label for="username" class="block text-sm font-medium text-gray-700">Username</label>
            <input
              type="text"
              name="username"
              id="username"
              required
              class="mt-1 block w-full rounded-md border border-gray-300 px-4 py-3 shadow-sm focus:border-indigo-500 focus:ring-indigo-500"
              placeholder="Choose a username"
            />
          </div>

          <!-- Email -->
          <div>
            <label for="email" class="block text-sm font-medium text-gray-700">Email</label>
            <input
              type="email"
              name="email"
              id="email"
              required
              class="mt-1 block w-full rounded-md border border-gray-300 px-4 py-3 shadow-sm focus:border-indigo-500 focus:ring-indigo-500"
              placeholder="Your email address"
            />
          </div>

          <!-- Password -->
          <div x-data="{ show: false }" class="relative">
            <label for="password1" class="block text-sm font-medium text-gray-700">Password</label>
            <input
              :type="show ? 'text' : 'password'"
              name="password1"
              id="password1"
              required
              class="mt-1 block w-full rounded-md border border-gray-300 px-4 py-3 shadow-sm focus:border-indigo-500 focus:ring-indigo-500"
              placeholder="Create a password"
            />
            <button
              type="button"
              @click="show = !show"
              class="absolute inset-y-0 right-0 flex items-center pr-3 text-sm leading-5 text-gray-500 hover:text-gray-700"
            >
              <span x-text="show ? 'Hide' : 'Show'"></span>
            </button>
          </div>

          <!-- Confirm Password -->
          <div x-data="{ show: false }" class="relative">
            <label for="password2" class="block text-sm font-medium text-gray-700"
              >Confirm Password</label
            >
            <input
              :type="show ? 'text' : 'password'"
              name="password2"
              id="password2"
              required
              class="mt-1 block w-full rounded-md border border-gray-300 px-4 py-3 shadow-sm focus:border-indigo-500 focus:ring-indigo-500"
              placeholder="Confirm your password"
            />
            <button
              type="button"
              @click="show = !show"
              class="absolute inset-y-0 right-0 flex items-center pr-3 text-sm leading-5 text-gray-500 hover:text-gray-700"
            >
              <span x-text="show ? 'Hide' : 'Show'"></span>
            </button>
          </div>

          <!-- Role Selection -->
          <div>
            <label class="mb-2 block text-sm font-medium text-gray-700">I am a</label>
            <div class="grid grid-cols-2 gap-4">
              <label
                class="flex cursor-pointer items-center rounded-md border border-gray-300 p-3 hover:bg-gray-50"
              >
                <input
                  type="radio"
                  name="role"
                  value="lecturer"
                  id="role-lecturer"
                  class="h-4 w-4 rounded border-gray-300 text-indigo-600 focus:ring-indigo-500"
                />
                <span class="ml-2 text-sm text-gray-700">Lecturer</span>
              </label>
              <label
                class="flex cursor-pointer items-center rounded-md border border-gray-300 p-3 hover:bg-gray-50"
              >
                <input
                  type="radio"
                  name="role"
                  value="student"
                  id="role-student"
                  checked
                  class="h-4 w-4 rounded border-gray-300 text-indigo-600 focus:ring-indigo-500"
                />
                <span class="ml-2 text-sm text-gray-700">Student</span>
              </label>
            </div>
          </div>

          <!-- Lecturer Specific Fields (Conditional) -->
          <div id="lecturer-fields" class="hidden">
            <div class="space-y-4 pt-4">
              <div>
                <label for="staff_id" class="block text-sm font-medium text-gray-700"
                  >Staff ID</label
                >
                <input
                  type="text"
                  name="staff_id"
                  id="staff_id"
                  class="mt-1 block w-full rounded-md border border-gray-300 px-4 py-3 shadow-sm focus:border-indigo-500 focus:ring-indigo-500"
                  placeholder="Your staff ID"
                />
              </div>
              <div>
                <label for="lecturer_name" class="block text-sm font-medium text-gray-700"
                  >Full Name</label
                >
                <input
                  type="text"
                  name="name"
                  id="lecturer_name"
                  class="mt-1 block w-full rounded-md border border-gray-300 px-4 py-3 shadow-sm focus:border-indigo-500 focus:ring-indigo-500"
                  placeholder="Your full name"
                />
              </div>
              <div>
                <label for="lecturer_department" class="block text-sm font-medium text-gray-700"
                  >Department</label
                >
                <input
                  type="text"
                  name="department"
                  id="lecturer_department"
                  class="mt-1 block w-full rounded-md border border-gray-300 px-4 py-3 shadow-sm focus:border-indigo-500 focus:ring-indigo-500"
                  placeholder="Your department"
                />
              </div>
              <div>
                <label for="lecturer_phone" class="block text-sm font-medium text-gray-700"
                  >Phone Number</label
                >
                <input
                  type="tel"
                  name="phone_number"
                  id="lecturer_phone"
                  class="mt-1 block w-full rounded-md border border-gray-300 px-4 py-3 shadow-sm focus:border-indigo-500 focus:ring-indigo-500"
                  placeholder="Your phone number"
                />
              </div>
            </div>
          </div>

          <!-- Student Specific Fields (Conditional) -->
          <div id="student-fields" class="space-y-4 pt-4">
            <div>
              <label for="student_id" class="block text-sm font-medium text-gray-700"
                >Student ID</label
              >
              <input
                type="text"
                name="student_id"
                id="student_id"
                class="mt-1 block w-full rounded-md border border-gray-300 px-4 py-3 shadow-sm focus:border-indigo-500 focus:ring-indigo-500"
                placeholder="Your student ID"
              />
            </div>
            <div>
              <label for="student_name" class="block text-sm font-medium text-gray-700"
                >Full Name</label
              >
              <input
                type="text"
                name="name"
                id="student_name"
                class="mt-1 block w-full rounded-md border border-gray-300 px-4 py-3 shadow-sm focus:border-indigo-500 focus:ring-indigo-500"
                placeholder="Your full name"
              />
            </div>
            <div>
              <label for="programme_of_study" class="block text-sm font-medium text-gray-700"
                >Programme of Study</label
              >
              <input
                type="text"
                name="programme_of_study"
                id="programme_of_study"
                class="mt-1 block w-full rounded-md border border-gray-300 px-4 py-3 shadow-sm focus:border-indigo-500 focus:ring-indigo-500"
                placeholder="Your programme"
              />
            </div>
            <div>
              <label for="year" class="block text-sm font-medium text-gray-700">Year</label>
              <input
                type="number"
                name="year"
                id="year"
                min="1"
                max="4"
                class="mt-1 block w-full rounded-md border border-gray-300 px-4 py-3 shadow-sm focus:border-indigo-500 focus:ring-indigo-500"
                placeholder="Year (1-4)"
              />
            </div>
            <div>
              <label for="student_phone" class="block text-sm font-medium text-gray-700"
                >Phone Number</label
              >
              <input
                type="tel"
                name="phone_number"
                id="student_phone"
                class="mt-1 block w-full rounded-md border border-gray-300 px-4 py-3 shadow-sm focus:border-indigo-500 focus:ring-indigo-500"
                placeholder="Your phone number"
              />
            </div>
          </div>

          <!-- Submit Button -->
          <button
            type="submit"
            class="flex w-full justify-center rounded-md border border-transparent bg-indigo-600 px-4 py-3 text-sm font-medium text-white shadow-sm hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2"
          >
            Create Account
          </button>

          <!-- Loading Indicator -->
          <div class="htmx-indicator text-center text-gray-500">Creating account...</div>
        </form>

        <!-- Login Link -->
        <div class="mt-6 text-center">
          <p class="text-sm text-gray-600">
            Already have an account?
            <a
              href="{% url 'frontend:login' %}"
              class="font-medium text-indigo-600 hover:text-indigo-500"
            >
              Sign in here
            </a>
          </p>
        </div>
      </div>

      <!-- Footer -->
      <div class="bg-gray-50 px-8 py-4 text-center">
        <p class="text-xs text-gray-500">&copy; {% now "Y" %} Exodus Attendance System</p>
      </div>
    </div>

    <script>
      document.body.addEventListener('htmx:configRequest', (event) => {
        event.detail.headers['X-CSRFToken'] = '{{ csrf_token }}';
      });

      // Show/hide conditional fields based on role
      document.addEventListener('DOMContentLoaded', function () {
        const roleLecturer = document.getElementById('role-lecturer');
        const roleStudent = document.getElementById('role-student');
        const lecturerFields = document.getElementById('lecturer-fields');
        const studentFields = document.getElementById('student-fields');

        function toggleFields() {
          if (roleLecturer.checked) {
            lecturerFields.classList.remove('hidden');
            studentFields.classList.add('hidden');
          } else if (roleStudent.checked) {
            studentFields.classList.remove('hidden');
            lecturerFields.classList.add('hidden');
          }
        }

        roleLecturer.addEventListener('change', toggleFields);
        roleStudent.addEventListener('change', toggleFields);

        // Initial toggle
        toggleFields();
      });
    </script>
  </body>
</html>
