<div class="bg-red-50 border border-red-200 rounded-lg p-4">
    <div class="flex items-center">
        <svg class="h-5 w-5 text-red-600 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z"></path>
        </svg>
        <p class="text-sm text-red-800">
            Are you sure you want to delete <strong>{{ student.name }}</strong> ({{ student.student_id }})? This action cannot be undone.
        </p>
    </div>
    <div class="mt-3 flex gap-2 justify-end">
        <button hx-post="{% url 'frontend:student_delete' student.id %}"
                class="px-4 py-2 bg-red-600 text-white text-sm rounded-lg hover:bg-red-700">
            Confirm Delete
        </button>
        <button onclick="this.closest('.bg-red-50').remove()"
                class="px-4 py-2 bg-gray-200 text-gray-700 text-sm rounded-lg hover:bg-gray-300">
            Cancel
        </button>
    </div>
</div>
