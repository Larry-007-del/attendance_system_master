{% extends 'base.html' %} {% block title %}Add Lecturer - Exodus{% endblock %} {% block content %}
<div class="mb-6">
  <a
    href="{% url 'frontend:lecturer_list' %}"
    class="mb-4 flex items-center text-indigo-600 hover:text-indigo-800"
  >
    <svg class="mr-1 h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="2"
        d="M15 19l-7-7 7-7"
      ></path>
    </svg>
    Back to Lecturers
  </a>
  <h1 class="text-2xl font-bold text-gray-900">Add New Lecturer</h1>
</div>

<div class="rounded-lg bg-white shadow">
  <form method="post" class="space-y-6 p-6" hx-boost="true" enctype="multipart/form-data">
    {% csrf_token %}

    <div class="grid grid-cols-1 gap-6 md:grid-cols-2">
      <!-- Username -->
      <div>
        <label for="username" class="block text-sm font-medium text-gray-700">Username *</label>
        <input
          type="text"
          name="username"
          id="username"
          required
          class="mt-1 block w-full rounded-lg border border-gray-300 px-4 py-2 focus:border-indigo-500 focus:ring-indigo-500"
        />
      </div>

      <!-- Email -->
      <div>
        <label for="email" class="block text-sm font-medium text-gray-700">Email *</label>
        <input
          type="email"
          name="email"
          id="email"
          required
          class="mt-1 block w-full rounded-lg border border-gray-300 px-4 py-2 focus:border-indigo-500 focus:ring-indigo-500"
        />
      </div>

      <!-- Password -->
      <div>
        <label for="password" class="block text-sm font-medium text-gray-700">Password *</label>
        <input
          type="password"
          name="password"
          id="password"
          required
          class="mt-1 block w-full rounded-lg border border-gray-300 px-4 py-2 focus:border-indigo-500 focus:ring-indigo-500"
        />
      </div>

      <!-- Staff ID -->
      <div>
        <label for="staff_id" class="block text-sm font-medium text-gray-700">Staff ID *</label>
        <input
          type="text"
          name="staff_id"
          id="staff_id"
          required
          class="mt-1 block w-full rounded-lg border border-gray-300 px-4 py-2 focus:border-indigo-500 focus:ring-indigo-500"
        />
      </div>

      <!-- Name -->
      <div class="md:col-span-2">
        <label for="name" class="block text-sm font-medium text-gray-700">Full Name *</label>
        <input
          type="text"
          name="name"
          id="name"
          required
          class="mt-1 block w-full rounded-lg border border-gray-300 px-4 py-2 focus:border-indigo-500 focus:ring-indigo-500"
        />
      </div>

      <!-- Profile Picture -->
      <div class="md:col-span-2">
        <label for="profile_picture" class="block text-sm font-medium text-gray-700">Profile Picture</label>
        <input
          type="file"
          name="profile_picture"
          id="profile_picture"
          accept="image/*"
          class="mt-1 block w-full text-sm text-gray-500 file:mr-4 file:rounded-md file:border-0 file:bg-indigo-50 file:px-4 file:py-2 file:text-sm file:font-semibold file:text-indigo-700 hover:file:bg-indigo-100 focus:outline-none"
        />
      </div>

      <!-- Department -->
      <div>
        <label for="department" class="block text-sm font-medium text-gray-700">Department</label>
        <input
          type="text"
          name="department"
          id="department"
          class="mt-1 block w-full rounded-lg border border-gray-300 px-4 py-2 focus:border-indigo-500 focus:ring-indigo-500"
        />
      </div>

      <!-- Phone Number -->
      <div>
        <label for="phone_number" class="block text-sm font-medium text-gray-700"
          >Phone Number</label
        >
        <input
          type="text"
          name="phone_number"
          id="phone_number"
          class="mt-1 block w-full rounded-lg border border-gray-300 px-4 py-2 focus:border-indigo-500 focus:ring-indigo-500"
        />
      </div>

      <!-- Latitude -->
      <div>
        <label for="latitude" class="block text-sm font-medium text-gray-700">Latitude</label>
        <input
          type="number"
          step="any"
          name="latitude"
          id="latitude"
          placeholder="e.g., 5.6037"
          class="mt-1 block w-full rounded-lg border border-gray-300 px-4 py-2 focus:border-indigo-500 focus:ring-indigo-500"
        />
      </div>

      <!-- Longitude -->
      <div>
        <label for="longitude" class="block text-sm font-medium text-gray-700">Longitude</label>
        <input
          type="number"
          step="any"
          name="longitude"
          id="longitude"
          placeholder="e.g., -0.1870"
          class="mt-1 block w-full rounded-lg border border-gray-300 px-4 py-2 focus:border-indigo-500 focus:ring-indigo-500"
        />
      </div>
    </div>

    <div class="flex justify-end gap-4 border-t border-gray-200 pt-4">
      <a
        href="{% url 'frontend:lecturer_list' %}"
        class="rounded-lg border border-gray-300 px-6 py-2 text-gray-700 hover:bg-gray-50"
      >
        Cancel
      </a>
      <button
        type="submit"
        class="rounded-lg bg-indigo-600 px-6 py-2 text-white hover:bg-indigo-700"
      >
        Create Lecturer
      </button>
    </div>
  </form>
</div>
{% endblock %}
