{% extends 'base.html' %} {% block title %}Lecturers - Exodus{% endblock %} {% block content %}
<div class="mb-6 flex flex-col md:flex-row md:items-center md:justify-between">
  <div>
    <h1 class="text-2xl font-bold text-gray-900">Lecturers</h1>
    <p class="mt-1 text-gray-600">Manage lecturer records</p>
  </div>
  <a
    href="{% url 'frontend:lecturer_create' %}"
    class="mt-4 inline-flex items-center rounded-lg bg-indigo-600 px-4 py-2 text-white hover:bg-indigo-700 md:mt-0"
  >
    <svg class="mr-2 h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="2"
        d="M12 4v16m8-8H4"
      ></path>
    </svg>
    Add Lecturer
  </a>
</div>

<!-- Search -->
<div class="mb-6 rounded-lg bg-white p-4 shadow">
  <form method="get" class="flex flex-col gap-4 md:flex-row">
    <div class="flex-1">
      <input type="hidden" name="sort" value="{{ sort }}">
      <input
        type="text"
        name="q"
        value="{{ query }}"
        placeholder="Search by name, staff ID, or department..."
        hx-get="{% url 'frontend:lecturer_list' %}"
        hx-trigger="keyup changed delay:500ms"
        hx-target="#lecturer-list-container"
        hx-push-url="true"
        class="w-full rounded-lg border border-gray-300 px-4 py-2 focus:border-indigo-500 focus:ring-indigo-500 dark:border-gray-600 dark:bg-gray-700 dark:text-white"
      />
    </div>
    <button type="submit" class="rounded-lg bg-gray-800 px-6 py-2 text-white hover:bg-gray-900">
      Search
    </button>
    {% if query %}
    <a
      href="{% url 'frontend:lecturer_list' %}"
      class="rounded-lg border border-gray-300 px-6 py-2 hover:bg-gray-50"
    >
      Clear
    </a>
    {% endif %}
  </form>
</div>

<!-- Lecturers Table Container for HTMX -->
<div id="lecturer-list-container">
  {% include 'partials/lecturer_list_content.html' %}
</div>

{% endblock %}
