{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Not Found - Exodus</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}" />
  </head>
  <body class="flex min-h-screen items-center justify-center bg-gray-50">
    <div class="px-6 text-center">
      <p class="mb-4 text-6xl font-bold text-indigo-600">404</p>
      <h1 class="mb-2 text-3xl font-bold text-gray-900">Page not found</h1>
      <p class="mx-auto mb-8 max-w-md text-gray-500">
        Sorry, the page you're looking for doesn't exist or has been moved.
      </p>
      <div class="flex items-center justify-center gap-4">
        <a
          href="/"
          class="rounded-lg bg-indigo-600 px-6 py-2.5 font-medium text-white transition hover:bg-indigo-700"
        >
          Go Home
        </a>
        <a
          href="javascript:history.back()"
          class="rounded-lg border border-gray-300 px-6 py-2.5 font-medium text-gray-700 transition hover:bg-gray-100"
        >
          Go Back
        </a>
      </div>
    </div>
  </body>
</html>
