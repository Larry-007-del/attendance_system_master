<!-- Stats cards widget for admin dashboard (AdminLTE/Jazzmin compatible) -->
<div class="row mb-3">
    <div class="col-lg-2 col-md-4 col-sm-6 col-12">
        <div class="small-box bg-info">
            <div class="inner">
                <h3>{{ total_students }}</h3>
                <p>Students</p>
            </div>
            <div class="icon">
                <i class="fas fa-user-graduate"></i>
            </div>
        </div>
    </div>
    <div class="col-lg-2 col-md-4 col-sm-6 col-12">
        <div class="small-box bg-purple">
            <div class="inner">
                <h3>{{ total_lecturers }}</h3>
                <p>Lecturers</p>
            </div>
            <div class="icon">
                <i class="fas fa-chalkboard-teacher"></i>
            </div>
        </div>
    </div>
    <div class="col-lg-2 col-md-4 col-sm-6 col-12">
        <div class="small-box bg-primary">
            <div class="inner">
                <h3>{{ active_courses }}</h3>
                <p>Active Courses</p>
            </div>
            <div class="icon">
                <i class="fas fa-book"></i>
            </div>
        </div>
    </div>
    <div class="col-lg-2 col-md-4 col-sm-6 col-12">
        <div class="small-box bg-success">
            <div class="inner">
                <h3>{{ total_checkins }}</h3>
                <p>Total Check-ins</p>
            </div>
            <div class="icon">
                <i class="fas fa-check-circle"></i>
            </div>
        </div>
    </div>
    <div class="col-lg-2 col-md-4 col-sm-6 col-12">
        <div class="small-box bg-warning">
            <div class="inner">
                <h3>{{ active_sessions }}</h3>
                <p>Active Sessions</p>
            </div>
            <div class="icon">
                <i class="fas fa-broadcast-tower"></i>
            </div>
        </div>
    </div>
    <div class="col-lg-2 col-md-4 col-sm-6 col-12">
        <div class="small-box bg-olive">
            <div class="inner">
                <h3>{{ today_sessions }}</h3>
                <p>Today's Sessions</p>
            </div>
            <div class="icon">
                <i class="fas fa-calendar-day"></i>
            </div>
        </div>
    </div>
</div>
