<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Welcome to Exodus</title>
  </head>
  <body style="font-family: Arial, sans-serif; background: #f4f6fb; margin: 0; padding: 24px">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0">
      <tr>
        <td align="center">
          <table
            role="presentation"
            width="600"
            cellspacing="0"
            cellpadding="0"
            style="background: #ffffff; border-radius: 8px; overflow: hidden"
          >
            <tr>
              <td style="background: #4f46e5; color: #fff; padding: 20px; text-align: center">
                <h2 style="margin: 0">Welcome to Exodus</h2>
              </td>
            </tr>
            <tr>
              <td style="padding: 24px; color: #111827">
                <p style="margin-top: 0">Hi {{ user.username }},</p>
                <p>Your <strong>{{ role }}</strong> account has been created successfully.</p>
                <p>You can now sign in and start using the attendance platform.</p>
                <p style="margin: 24px 0">
                  <a
                    href="{{ login_url }}"
                    style="
                      background: #4f46e5;
                      color: #ffffff;
                      text-decoration: none;
                      padding: 10px 16px;
                      border-radius: 6px;
                      display: inline-block;
                    "
                    >Sign in to Exodus</a
                  >
                </p>
                <p style="margin-bottom: 0; color: #6b7280; font-size: 13px">
                  For security, we recommend enabling 2FA after your first login.
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
