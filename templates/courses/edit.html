{% extends 'base.html' %} {% block title %}Edit {{ course.name }} - Exodus{% endblock %} {% block content %}
<div class="mb-6">
  <a
    href="{% url 'frontend:course_detail' course.id %}"
    class="mb-4 flex items-center text-indigo-600 hover:text-indigo-800"
  >
    <svg class="mr-1 h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="2"
        d="M15 19l-7-7 7-7"
      ></path>
    </svg>
    Back to Course
  </a>
  <h1 class="text-2xl font-bold text-gray-900">Edit Course</h1>
</div>

<div class="rounded-lg bg-white shadow">
  <form method="post" class="space-y-6 p-6">
    {% csrf_token %}

    <div class="grid grid-cols-1 gap-6 md:grid-cols-2">
      <div>
        <label for="name" class="block text-sm font-medium text-gray-700">Course Name</label>
        <input
          type="text"
          name="name"
          id="name"
          value="{{ course.name }}"
          required
          class="mt-1 block w-full rounded-lg border border-gray-300 px-4 py-2 focus:border-indigo-500 focus:ring-indigo-500"
        />
      </div>

      <div>
        <label for="course_code" class="block text-sm font-medium text-gray-700">Course Code</label>
        <input
          type="text"
          name="course_code"
          id="course_code"
          value="{{ course.course_code }}"
          required
          class="mt-1 block w-full rounded-lg border border-gray-300 px-4 py-2 focus:border-indigo-500 focus:ring-indigo-500"
        />
      </div>

      <div>
        <label for="lecturer" class="block text-sm font-medium text-gray-700">Lecturer</label>
        <select
          name="lecturer"
          id="lecturer"
          required
          class="mt-1 block w-full rounded-lg border border-gray-300 px-4 py-2 focus:border-indigo-500 focus:ring-indigo-500"
        >
          {% for lecturer in lecturers %}
          <option
            value="{{ lecturer.id }}"
            {% if course.lecturer.id == lecturer.id %}selected{% endif %}
          >
            {{ lecturer.name }}
          </option>
          {% endfor %}
        </select>
      </div>

      <div class="mt-6 flex items-center">
        <input
          type="checkbox"
          name="is_active"
          id="is_active"
          {% if course.is_active %}checked{% endif %}
          class="h-4 w-4 rounded border-gray-300 text-blue-600 focus:ring-indigo-500"
        />
        <label for="is_active" class="ml-2 block text-sm text-gray-700">Active</label>
      </div>
    </div>

    <div class="border-t border-gray-200 pt-4">
      <label class="mb-2 block text-sm font-medium text-gray-700">Enrolled Students</label>
      <div
        class="grid max-h-60 grid-cols-2 gap-2 overflow-y-auto rounded-lg border border-gray-300 p-4 md:grid-cols-3"
      >
        {% for student in students %}
        <label class="flex items-center space-x-2">
          <input
            type="checkbox"
            name="students"
            value="{{ student.id }}"
            {% if student.id in current_enrollments %}checked{% endif %}
            class="rounded border-gray-300 text-blue-600 focus:ring-indigo-500"
          />
          <span class="text-sm text-gray-700">{{ student.name }}</span>
        </label>
        {% endfor %}
      </div>
    </div>

    <div class="flex justify-end gap-4 border-t border-gray-200 pt-4">
      <a
        href="{% url 'frontend:course_detail' course.id %}"
        class="rounded-lg border border-gray-300 px-6 py-2 text-gray-700 hover:bg-gray-50"
        >Cancel</a
      >
      <button
        type="submit"
        class="rounded-lg bg-indigo-600 px-6 py-2 text-white hover:bg-indigo-700"
      >
        Save Changes
      </button>
    </div>
  </form>
</div>
{% endblock %}
