{% extends 'base.html' %} {% block title %}Courses - Exodus{% endblock %} {% block content %}
<div class="mb-6 flex flex-col md:flex-row md:items-center md:justify-between">
  <div>
    <h1 class="text-2xl font-bold text-gray-900">Courses</h1>
    <p class="mt-1 text-gray-600">Manage course offerings</p>
  </div>
  <div class="mt-4 flex gap-2 md:mt-0">
    <a
      href="{% url 'frontend:upload_enrollments' %}"
      class="inline-flex items-center rounded-lg border border-gray-300 bg-white px-4 py-2 text-gray-700 shadow-sm hover:bg-gray-50"
    >
      <svg class="mr-2 h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"
        />
      </svg>
      Bulk Enroll
    </a>
    <a
      href="{% url 'frontend:course_create' %}"
      class="inline-flex items-center rounded-lg bg-indigo-600 px-4 py-2 text-white shadow-sm hover:bg-indigo-700"
    >
      <svg class="mr-2 h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M12 4v16m8-8H4"
        ></path>
      </svg>
      Add Course
    </a>
  </div>
</div>

<!-- Search & Filters -->
<div class="mb-6 rounded-lg bg-white p-4 shadow dark:bg-gray-800">
  <form method="get" class="flex flex-col gap-4 md:flex-row" id="courseSearchForm">
    <div class="flex-1">
      <input
        type="text"
        name="q"
        value="{{ query }}"
        placeholder="Search by name or course code..."
        hx-get="{% url 'frontend:course_list' %}"
        hx-trigger="keyup changed delay:500ms, search"
        hx-target="#course-list-container"
        hx-include="#courseSearchForm"
        hx-push-url="true"
        class="w-full rounded-lg border border-gray-300 px-4 py-2 focus:border-indigo-500 focus:ring-indigo-500 dark:border-gray-600 dark:bg-gray-700 dark:text-white"
      />
    </div>
    <select
      name="active"
      hx-get="{% url 'frontend:course_list' %}"
      hx-trigger="change"
      hx-target="#course-list-container"
      hx-include="#courseSearchForm"
      hx-push-url="true"
      class="rounded-lg border border-gray-300 px-4 py-2 focus:border-indigo-500 focus:ring-indigo-500 dark:border-gray-600 dark:bg-gray-700 dark:text-white"
    >
      <option value="">All Status</option>
      <option value="true" {% if active_filter == 'true' %}selected{% endif %}>Active</option>
      <option value="false" {% if active_filter == 'false' %}selected{% endif %}>Inactive</option>
    </select>
    <select
      name="sort"
      hx-get="{% url 'frontend:course_list' %}"
      hx-trigger="change"
      hx-target="#course-list-container"
      hx-include="#courseSearchForm"
      hx-push-url="true"
      class="rounded-lg border border-gray-300 px-4 py-2 focus:border-indigo-500 focus:ring-indigo-500 dark:border-gray-600 dark:bg-gray-700 dark:text-white"
    >
      <option value="name" {% if sort == 'name' %}selected{% endif %}>Name (A-Z)</option>
      <option value="-name" {% if sort == '-name' %}selected{% endif %}>Name (Z-A)</option>
      <option value="course_code" {% if sort == 'course_code' %}selected{% endif %}>Code (A-Z)</option>
      <option value="-course_code" {% if sort == '-course_code' %}selected{% endif %}>Code (Z-A)</option>
    </select>
  </form>
</div>

<!-- Courses Grid Container -->
<div id="course-list-container">
  {% include 'partials/course_list_content.html' %}
</div>

{% endblock %}
