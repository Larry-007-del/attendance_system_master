{% extends 'base.html' %} {% block title %}Add Student - Exodus{% endblock %} {% block content %}
<div class="mb-6">
  <a
    href="{% url 'frontend:student_list' %}"
    class="mb-4 flex items-center text-indigo-600 hover:text-indigo-800"
  >
    <svg class="mr-1 h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="2"
        d="M15 19l-7-7 7-7"
      ></path>
    </svg>
    Back to Students
  </a>
  <h1 class="text-2xl font-bold text-gray-900">Add New Student</h1>
</div>

<div class="rounded-lg bg-white shadow">
  <form method="post" class="space-y-6 p-6" hx-boost="true" enctype="multipart/form-data">
    {% csrf_token %}

    <div class="grid grid-cols-1 gap-6 md:grid-cols-2">
      <div>
        <label for="username" class="block text-sm font-medium text-gray-700">Username *</label>
        <input
          type="text"
          name="username"
          id="username"
          required
          class="mt-1 block w-full rounded-lg border border-gray-300 px-4 py-2 focus:border-green-500 focus:ring-green-500"
        />
      </div>

      <div>
        <label for="email" class="block text-sm font-medium text-gray-700">Email *</label>
        <input
          type="email"
          name="email"
          id="email"
          required
          class="mt-1 block w-full rounded-lg border border-gray-300 px-4 py-2 focus:border-green-500 focus:ring-green-500"
        />
      </div>

      <div>
        <label for="password" class="block text-sm font-medium text-gray-700">Password *</label>
        <input
          type="password"
          name="password"
          id="password"
          required
          class="mt-1 block w-full rounded-lg border border-gray-300 px-4 py-2 focus:border-green-500 focus:ring-green-500"
        />
      </div>

      <div>
        <label for="student_id" class="block text-sm font-medium text-gray-700">Student ID *</label>
        <input
          type="text"
          name="student_id"
          id="student_id"
          required
          class="mt-1 block w-full rounded-lg border border-gray-300 px-4 py-2 focus:border-green-500 focus:ring-green-500"
        />
      </div>

      <div class="md:col-span-2">
        <label for="name" class="block text-sm font-medium text-gray-700">Full Name *</label>
        <input
          type="text"
          name="name"
          id="name"
          required
          class="mt-1 block w-full rounded-lg border border-gray-300 px-4 py-2 focus:border-green-500 focus:ring-green-500"
        />
      </div>

      <!-- Profile Picture -->
      <div class="md:col-span-2">
        <label for="profile_picture" class="block text-sm font-medium text-gray-700">Profile Picture</label>
        <input
          type="file"
          name="profile_picture"
          id="profile_picture"
          accept="image/*"
          class="mt-1 block w-full text-sm text-gray-500 file:mr-4 file:rounded-md file:border-0 file:bg-green-50 file:px-4 file:py-2 file:text-sm file:font-semibold file:text-green-700 hover:file:bg-green-100 focus:outline-none"
        />
      </div>

      <div>
        <label for="programme_of_study" class="block text-sm font-medium text-gray-700"
          >Programme of Study</label
        >
        <input
          type="text"
          name="programme_of_study"
          id="programme_of_study"
          class="mt-1 block w-full rounded-lg border border-gray-300 px-4 py-2 focus:border-green-500 focus:ring-green-500"
        />
      </div>

      <div>
        <label for="year" class="block text-sm font-medium text-gray-700">Year</label>
        <input
          type="text"
          name="year"
          id="year"
          placeholder="e.g., 1, 2, 3"
          class="mt-1 block w-full rounded-lg border border-gray-300 px-4 py-2 focus:border-green-500 focus:ring-green-500"
        />
      </div>

      <div>
        <label for="phone_number" class="block text-sm font-medium text-gray-700"
          >Phone Number</label
        >
        <input
          type="text"
          name="phone_number"
          id="phone_number"
          class="mt-1 block w-full rounded-lg border border-gray-300 px-4 py-2 focus:border-green-500 focus:ring-green-500"
        />
      </div>
    </div>

    <div class="flex justify-end gap-4 border-t border-gray-200 pt-4">
      <a
        href="{% url 'frontend:student_list' %}"
        class="rounded-lg border border-gray-300 px-6 py-2 text-gray-700 hover:bg-gray-50"
      >
        Cancel
      </a>
      <button type="submit" class="rounded-lg bg-green-600 px-6 py-2 text-white hover:bg-green-700">
        Create Student
      </button>
    </div>
  </form>
</div>
{% endblock %}
