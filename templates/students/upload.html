{% extends 'base.html' %}
{% block content %}
<div class="max-w-xl mx-auto mt-10">
    <div class="border-2 border-dashed border-gray-300 rounded-lg p-12 text-center hover:border-blue-500 transition-colors">
        <svg class="mx-auto h-12 w-12 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
        </svg>
        <p class="mt-4 text-sm text-gray-600">Drag and drop your CSV here, or click to select a file</p>
        <form method="post" enctype="multipart/form-data" class="mt-4">
            {% csrf_token %}
            <div class="hidden">{{ form.file }}</div>
            <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded-md font-medium hover:bg-blue-700">
                Upload CSV
            </button>
        </form>
    </div>
    <div class="mt-2 text-xs text-gray-500 text-center">
        Expected columns: First Name, Last Name, Email, Student ID
    </div>
</div>
{% endblock %}
