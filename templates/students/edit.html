{% extends 'base.html' %} {% block title %}Edit {{ student.name }} - Exodus{% endblock %} {% block content %}
<div class="mb-6">
  <a
    href="{% url 'frontend:student_detail' student.id %}"
    class="mb-4 flex items-center text-indigo-600 hover:text-indigo-800"
  >
    <svg class="mr-1 h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="2"
        d="M15 19l-7-7 7-7"
      ></path>
    </svg>
    Back to Student
  </a>
  <h1 class="text-2xl font-bold text-gray-900">Edit Student</h1>
</div>

<div class="rounded-lg bg-white shadow">
  <form method="post" class="space-y-6 p-6" hx-boost="true" enctype="multipart/form-data">
    {% csrf_token %}

    <div class="grid grid-cols-1 gap-6 md:grid-cols-2">
      <div class="md:col-span-2">
        <label for="name" class="block text-sm font-medium text-gray-700">Full Name</label>
        <input
          type="text"
          name="name"
          id="name"
          value="{{ student.name }}"
          required
          class="mt-1 block w-full rounded-lg border border-gray-300 px-4 py-2 focus:border-green-500 focus:ring-green-500"
        />
      </div>

      <!-- Profile Picture -->
      <div class="md:col-span-2">
        <label for="profile_picture" class="block text-sm font-medium text-gray-700">Profile Picture</label>
        {% if student.profile_picture %}
          <div class="mt-2 mb-3">
            <img src="{{ student.profile_picture.url }}" alt="Profile Picture" class="h-16 w-16 rounded-full object-cover border border-gray-200 shadow-sm">
          </div>
        {% endif %}
        <input
          type="file"
          name="profile_picture"
          id="profile_picture"
          accept="image/*"
          class="mt-1 block w-full text-sm text-gray-500 file:mr-4 file:rounded-md file:border-0 file:bg-green-50 file:px-4 file:py-2 file:text-sm file:font-semibold file:text-green-700 hover:file:bg-green-100 focus:outline-none"
        />
      </div>

      <div>
        <label for="programme_of_study" class="block text-sm font-medium text-gray-700"
          >Programme of Study</label
        >
        <input
          type="text"
          name="programme_of_study"
          id="programme_of_study"
          value="{{ student.programme_of_study|default:'' }}"
          class="mt-1 block w-full rounded-lg border border-gray-300 px-4 py-2 focus:border-green-500 focus:ring-green-500"
        />
      </div>

      <div>
        <label for="year" class="block text-sm font-medium text-gray-700">Year</label>
        <input
          type="text"
          name="year"
          id="year"
          value="{{ student.year|default:'' }}"
          class="mt-1 block w-full rounded-lg border border-gray-300 px-4 py-2 focus:border-green-500 focus:ring-green-500"
        />
      </div>

      <div>
        <label for="phone_number" class="block text-sm font-medium text-gray-700"
          >Phone Number</label
        >
        <input
          type="text"
          name="phone_number"
          id="phone_number"
          value="{{ student.phone_number|default:'' }}"
          class="mt-1 block w-full rounded-lg border border-gray-300 px-4 py-2 focus:border-green-500 focus:ring-green-500"
        />
      </div>
    </div>

    <div class="mt-6 border-t border-gray-200 pt-6">
      <h3 class="mb-4 text-lg font-semibold text-gray-900">Notification Preferences</h3>

      <div class="grid grid-cols-1 gap-6 md:grid-cols-2">
        <div>
          <label for="is_notifications_enabled" class="flex items-center">
            <input
              type="checkbox"
              name="is_notifications_enabled"
              id="is_notifications_enabled"
              {% if student.is_notifications_enabled %}checked{% endif %}
              class="rounded border-gray-300 text-green-600 focus:ring-green-500"
            />
            <span class="ml-2 text-sm font-medium text-gray-700">Enable Notifications</span>
          </label>
        </div>

        <div>
          <label for="notification_preference" class="block text-sm font-medium text-gray-700"
            >Notification Method</label
          >
          <select
            name="notification_preference"
            id="notification_preference"
            class="mt-1 block w-full rounded-lg border border-gray-300 px-4 py-2 focus:border-green-500 focus:ring-green-500"
          >
            <option
              value="email"
              {% if student.notification_preference == 'email' %}selected{% endif %}
            >
              Email
            </option>
            <option
              value="sms"
              {% if student.notification_preference == 'sms' %}selected{% endif %}
            >
              SMS
            </option>
            <option
              value="both"
              {% if student.notification_preference == 'both' %}selected{% endif %}
            >
              Both Email and SMS
            </option>
            <option
              value="none"
              {% if student.notification_preference == 'none' %}selected{% endif %}
            >
              None
            </option>
          </select>
        </div>
      </div>
    </div>

    <div class="flex justify-end gap-4 border-t border-gray-200 pt-4">
      <a
        href="{% url 'frontend:student_detail' student.id %}"
        class="rounded-lg border border-gray-300 px-6 py-2 text-gray-700 hover:bg-gray-50"
        >Cancel</a
      >
      <button type="submit" class="rounded-lg bg-green-600 px-6 py-2 text-white hover:bg-green-700">
        Save Changes
      </button>
    </div>
  </form>
</div>
{% endblock %}
