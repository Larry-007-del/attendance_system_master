services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=exodus_db
      - POSTGRES_USER=exodus_user
      - POSTGRES_PASSWORD=exodus_password
    ports:
      - "5432:5432"

  web:
    build: .
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgres://exodus_user:exodus_password@db:5432/exodus_db
      - DJANGO_DEBUG=True
      - DJANGO_ALLOWED_HOSTS=localhost,127.0.0.1,0.0.0.0
      - DJANGO_SECRET_KEY=django-insecure-docker-dev-key-at-least-32-bytes-long
      - CORS_ALLOWED_ORIGINS=http://localhost:8080,http://localhost:8000,http://127.0.0.1:8000
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    depends_on:
      - db
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
      
  celery:
    build: .
    command: celery -A attendance_system worker -l info
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgres://exodus_user:exodus_password@db:5432/exodus_db
      - DJANGO_DEBUG=True
      - DJANGO_SECRET_KEY=django-insecure-docker-dev-key-at-least-32-bytes-long
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    depends_on:
      - web
      - redis
      - db

  flutter_app:
    build: 
      context: ../exodus_mobile
    ports:
      - "8080:80"
    depends_on:
      - web

volumes:
  postgres_data:
