version: '3.8'

services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=exodus_db
      - POSTGRES_USER=exodus_user
      - POSTGRES_PASSWORD=exodus_password
    ports:
      - "5432:5432"

  web:
    build: .
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgres://exodus_user:exodus_password@db:5432/exodus_db
      - DJANGO_DEBUG=True
      - DJANGO_ALLOWED_HOSTS=localhost,127.0.0.1,0.0.0.0
      - DJANGO_SECRET_KEY=django-insecure-docker-dev-key
      - CORS_ALLOW_ALL_ORIGINS=True
    depends_on:
      - db

volumes:
  postgres_data:
