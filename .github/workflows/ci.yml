name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      DJANGO_SETTINGS_MODULE: attendance_system.settings
      DJANGO_SECRET_KEY: ci-test-secret-key-not-for-production-use
      DJANGO_DEBUG: "True"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Node dependencies & build assets
        run: |
          npm ci
          npm run build

      - name: Run Django system checks
        run: python manage.py check

      - name: Run tests
        run: python manage.py test --verbosity=2

      - name: Run deploy check (audit)
        run: python manage.py check --deploy 2>&1 || true
